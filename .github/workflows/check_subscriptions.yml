name: 1 — Проверка подписок

on:
  workflow_dispatch:

jobs:
  check:
    name: Проверить подписки и записать в таблицу
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
      TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
      TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
      GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
      GOOGLE_SERVICE_ACCOUNT_FILE: service_account.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google credentials
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > service_account.json

      - name: Check subscriptions
        run: python scripts/check_subscriptions.py

      - name: Clean up credentials
        if: always()
        run: rm -f service_account.json
